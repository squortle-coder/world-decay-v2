name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: unzip chunk-destruction.zip && cd chunk-destruction && mvn package -q
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: chunk-destruction/target/*.jar
